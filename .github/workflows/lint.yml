name: Lint

on:
  pull_request:
  push:
    branches:
      - "*"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - name: Checkout sources
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 11
          run_install: false

      - name: Install dependencies
        run: pnpm install

      - name: Run biome:validate
        run: pnpm run biome:validate

      - name: Typecheck
        run: pnpm run lint
