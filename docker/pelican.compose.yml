services:
  panel:
    image: ${PELICAN_IMAGE:-ghcr.io/pelican-dev/panel:latest}
    restart: unless-stopped
    cpus: ${PELICAN_CPUS:-0}
    mem_limit: ${PELICAN_MEM:-0}
    environment:
      - TZ=Etc/UTC
      - XDG_DATA_HOME=/pelican-data
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_INSTALLED=true
      - APP_KEY=base64:567kaTtoGJ49kja4+esPz8Atd2jOMey4GzJvBGQ6/oY=
      - APP_URL=${PELICAN_URL:-http://localhost:80}
      - APP_TIMEZONE=UTC
      - BEHIND_PROXY=true
      - DB_CONNECTION=sqlite
    ports:
      - "${PELICAN_PORT:-80}:80"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost/up"]
      interval: 5s
      timeout: 5s
      retries: 120
      start_period: 30s
